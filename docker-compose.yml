name: vistron
services:

  web:
    build: ./vms_project
    container_name: vistron_saas
    ports:
      - "8000:8000"
    restart: always
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - ./vms_project/media:/app/media
      - staticfiles_data:/app/staticfiles

  db:
    image: postgres:15
    container_name: vistron_postgres
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: vistron_redis
    restart: always

volumes:
  postgres_data:
  staticfiles_data:
