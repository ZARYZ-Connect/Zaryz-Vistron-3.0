name: vistron
services:

  web:
    build: ./vms_project
    container_name: vistron_saas
    ports:
      - "8000:8000"
    restart: always
    environment:
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: vistron_db
      DB_USER: vistron_user
      DB_PASSWORD: vistron_pass
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - db
      - redis
    volumes:
      - ./vms_project/media:/app/media
      - ./vms_project/static:/app/static       # ← CSS/JS live sync
      - ./vms_project/templates:/app/templates # ← HTML live sync

  db:
    image: postgres:15
    container_name: vistron_postgres
    restart: always
    environment:
      POSTGRES_DB: vistron_db
      POSTGRES_USER: vistron_user
      POSTGRES_PASSWORD: vistron_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: vistron_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
